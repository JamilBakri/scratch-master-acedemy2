<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scratch Master Academy</title>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(to right, #007BFF, #00c6ff);
  color:white;
}

header {
  padding:20px;
  text-align:center;
  font-size:30px;
  font-weight:bold;
  background:white;
  color:#007BFF;
}

.container { padding:20px; }

.card {
  background:white;
  color:black;
  padding:15px;
  border-radius:15px;
  margin:15px 0;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#007BFF;
  color:white;
  cursor:pointer;
}

input {
  padding:10px;
  margin:5px;
  width:90%;
}

iframe {
  width:100%;
  height:200px;
  border-radius:10px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-content {
  background:white;
  color:black;
  margin:10% auto;
  padding:20px;
  width:300px;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<header>🎮 Scratch Master Academy</header>

<div class="container">

<!-- TUTORIALS -->
<div class="card">
<h2>📚 Tutorials</h2>
<iframe src="https://www.youtube.com/embed/jXUZaf5D12A"></iframe>
<iframe src="https://www.youtube.com/embed/VIpmkeqJhm4"></iframe>
</div>

<!-- QUIZ -->
<div class="card">
<h2>🧠 Quiz</h2>
<p id="question"></p>
<input id="answer" placeholder="Your answer">
<button onclick="checkAnswer()">Submit</button>
<p id="score">Score: 0</p>
</div>

<!-- PROJECTS -->
<div class="card">
<h2>🎮 Add Project</h2>
<input id="projectName" placeholder="Project name">
<button onclick="addProject()">Add</button>
<ul id="projects"></ul>
</div>

<!-- CERTIFICATE -->
<div class="card">
<h2>📜 Certificate</h2>
<input id="certName" placeholder="Your name">
<button onclick="generateCert()">Generate</button>
<button onclick="downloadCert()">PNG</button>
<button onclick="downloadPDF()">PDF</button>
<button onclick="saveCert()">Save</button>

<br><br>
<canvas id="canvas" width="500" height="300" style="background:white;border-radius:10px;"></canvas>

<ul id="certList"></ul>
</div>

<!-- CONTACT -->
<div class="card">
<h2>📞 Contact</h2>
<button onclick="openContact()">Open Contact</button>
</div>

<div id="contactModal" class="modal">
  <div class="modal-content">
    <h2>Contact Me</h2>
    <p>Jamil Bakri</p>
    <p>+35794020504</p>

    <a href="https://wa.me/35794020504" target="_blank">
      <button style="background:#25D366;">WhatsApp</button>
    </a>

    <h3>Email</h3>
    <input id="emailName" placeholder="Your Name">
    <input id="emailMsg" placeholder="Your Message">
    <button onclick="sendEmail()">Send</button>
  </div>
</div>

</div>

<script>

// QUIZ
let questions=[
{q:"What starts program?",a:"green"},
{q:"Scratch is?",a:"programming"},
{q:"Loop block?",a:"loop"},
{q:"Move block?",a:"motion"},
{q:"Sprite?",a:"character"},
{q:"Sound tab?",a:"sound"},
{q:"Code tab?",a:"code"},
{q:"Wait block?",a:"wait"},
{q:"Backdrop?",a:"background"},
{q:"Who made Scratch?",a:"mit"}
];

let current=0,score=0;

function loadQuestion(){
  document.getElementById("question").innerText=questions[current].q;
}
loadQuestion();

function checkAnswer(){
  let ans=document.getElementById("answer").value.toLowerCase();
  if(ans.includes(questions[current].a)) score+=10;
  current++;
  if(current<questions.length) loadQuestion();
  else alert("Finished!");
  document.getElementById("score").innerText="Score: "+score;
  document.getElementById("answer").value="";
}

// PROJECTS
function addProject(){
  let name=document.getElementById("projectName").value;
  let li=document.createElement("li");
  li.innerText=name;
  document.getElementById("projects").appendChild(li);
  localStorage.setItem("projects",projects.innerHTML);
}

// CERTIFICATE
function generateCert(){
  let name=document.getElementById("certName").value;
  let c=document.getElementById("canvas");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,500,300);

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,500,300);

  ctx.strokeStyle="gold";
  ctx.lineWidth=8;
  ctx.strokeRect(10,10,480,280);

  ctx.strokeStyle="#000";
  ctx.lineWidth=2;
  ctx.strokeRect(20,20,460,260);

  ctx.textAlign="center";

  ctx.font="bold 26px Georgia";
  ctx.fillText("Certificate of Achievement",250,60);

  ctx.font="16px Arial";
  ctx.fillText("Awarded to",250,100);

  ctx.font="bold 24px Georgia";
  ctx.fillStyle="#007BFF";
  ctx.fillText(name,250,140);

  ctx.fillStyle="#000";
  ctx.font="16px Arial";
  ctx.fillText("Scratch Master Course",250,170);

  let date=new Date().toLocaleDateString();
  ctx.fillText("Date: "+date,100,240);

  ctx.fillText("Signature:",320,240);
  ctx.beginPath();
  ctx.moveTo(400,245);
  ctx.lineTo(470,245);
  ctx.stroke();

  ctx.fillText("Jamil Bakri",250,270);

  // logo
  let img=new Image();
  img.onload=()=>ctx.drawImage(img,30,30,60,60);
  img.src="https://upload.wikimedia.org/wikipedia/commons/7/75/Scratch.logo.S.png";

  // seal
  ctx.beginPath();
  ctx.arc(430,90,30,0,Math.PI*2);
  ctx.fillStyle="gold";
  ctx.fill();
  ctx.fillStyle="#000";
  ctx.font="bold 12px Arial";
  ctx.fillText("OFFICIAL",430,95);
}

function downloadCert(){
  let link=document.createElement("a");
  link.download="certificate.png";
  link.href=canvas.toDataURL();
  link.click();
}

function downloadPDF(){
  const {jsPDF}=window.jspdf;
  let pdf=new jsPDF({orientation:"landscape"});
  pdf.addImage(canvas.toDataURL(),"PNG",10,10,270,150);
  pdf.save("certificate.pdf");
}

function saveCert(){
  let name=document.getElementById("certName").value;
  let date=new Date().toLocaleDateString();
  let li=document.createElement("li");
  li.innerText=name+" - "+date;
  document.getElementById("certList").appendChild(li);
  localStorage.setItem("certs",certList.innerHTML);
}

// CONTACT
function openContact(){
  document.getElementById("contactModal").style.display="block";
}

function sendEmail(){
  let name=document.getElementById("emailName").value;
  let msg=document.getElementById("emailMsg").value;
  window.location.href=`mailto:jamilbakri.2015@gmail.com?subject=${name}&body=${msg}`;
}

// LOAD
window.onload=function(){
  projects.innerHTML=localStorage.getItem("projects")||"";
  certList.innerHTML=localStorage.getItem("certs")||"";
}

</script>

</body>
</html>
