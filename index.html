<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch Master Academy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#007BFF,#00c6ff);
  color:white;
}
header{
  background:white;
  color:#007BFF;
  padding:20px;
  text-align:center;
  font-size:30px;
}
.container{padding:20px;}
.card{
  background:white;
  color:black;
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

/* ANIMATION */
canvas{
  background:white;
  border-radius:10px;
  margin-top:10px;
  animation:fadeIn 1s ease;
}
@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#007BFF;
  color:white;
  cursor:pointer;
}
input{
  padding:10px;
  margin:5px;
  width:90%;
}
iframe{width:100%; height:200px;}

/* CONTACT */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}
.modal-content{
  background:white;
  color:black;
  margin:10% auto;
  padding:20px;
  width:300px;
  border-radius:20px;
  text-align:center;
}
.close{
  float:right;
  cursor:pointer;
  font-size:20px;
}
</style>
</head>

<body>

<header>🎮 Scratch Master Academy</header>

<div class="container">

<!-- TUTORIALS -->
<div class="card">
<h2>📚 Tutorials</h2>
<iframe src="https://www.youtube.com/embed/jXUZaf5D12A"></iframe>
<iframe src="https://www.youtube.com/embed/VIpmkeqJhm4"></iframe>
</div>

<!-- QUIZ -->
<div class="card">
<h2>🧠 Quiz</h2>
<p id="question"></p>
<input id="answer">
<button onclick="checkAnswer()">Submit</button>
<p id="score">Score: 0</p>
</div>

<!-- PROJECTS -->
<div class="card">
<h2>🎮 Projects</h2>
<input id="projectName" placeholder="Project name">
<button onclick="addProject()">Add</button>
<ul id="projects"></ul>
</div>

<!-- CERTIFICATE -->
<div class="card">
<h2>📜 Animated Certificate</h2>
<input id="certName" placeholder="Your name">
<button onclick="generateCert()">Generate</button>
<button onclick="downloadPNG()">PNG</button>
<button onclick="downloadPDF()">PDF</button>

<canvas id="canvas" width="600" height="350"></canvas>
</div>

<!-- CONTACT -->
<div class="card">
<h2>📞 Contact</h2>
<button onclick="openContact()">Open Contact</button>
</div>

<!-- MODAL -->
<div id="contactModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeContact()">✖</span>

<h2>Contact</h2>
<p><b>Jamil Bakri</b></p>
<p>Age: 10</p>
<p>📞 +35794020504</p>

<a href="https://wa.me/35794020504" target="_blank">
<button style="background:#25D366;">WhatsApp</button>
</a>

<h3>Email</h3>
<input id="emailMsg" placeholder="Message">
<button onclick="sendEmail()">Send Email</button>

</div>
</div>

</div>

<script>

// QUIZ
let q=[
{q:"What block starts a program?",a:"green"},
{q:"What is Scratch?",a:"programming"},
{q:"Which block repeats?",a:"loop"}
];

let i=0,s=0;
function loadQ(){document.getElementById("question").innerText=q[i].q;}
loadQ();

function checkAnswer(){
let ans=document.getElementById("answer").value.toLowerCase();
if(ans.includes(q[i].a)) s+=10;
i++;
if(i<q.length) loadQ();
document.getElementById("score").innerText="Score: "+s;
}

// PROJECTS
function addProject(){
let name=document.getElementById("projectName").value;
if(!name) return;
let li=document.createElement("li");
li.innerText=name;
document.getElementById("projects").appendChild(li);
document.getElementById("projectName").value="";
}

// 🎓 ANIMATED CERTIFICATE
function generateCert(){
let name=document.getElementById("certName").value || "Your Name";
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let opacity=0;

let anim=setInterval(()=>{
ctx.clearRect(0,0,600,350);

// BACKGROUND
ctx.fillStyle="rgba(255,255,255,"+opacity+")";
ctx.fillRect(0,0,600,350);

// BORDER
ctx.strokeStyle="gold";
ctx.lineWidth=8;
ctx.strokeRect(10,10,580,330);

// TEXT
ctx.globalAlpha=opacity;
ctx.textAlign="center";

ctx.font="bold 30px Georgia";
ctx.fillStyle="black";
ctx.fillText("Certificate of Achievement",300,80);

ctx.font="18px Arial";
ctx.fillText("Awarded to",300,130);

ctx.fillStyle="#007BFF";
ctx.font="bold 28px Georgia";
ctx.fillText(name,300,180);

ctx.fillStyle="black";
ctx.font="18px Arial";
ctx.fillText("Scratch Master Course",300,220);

// GOLD SEAL GLOW
ctx.beginPath();
ctx.arc(500,100,35,0,Math.PI*2);
ctx.fillStyle="gold";
ctx.shadowBlur=20;
ctx.shadowColor="gold";
ctx.fill();
ctx.shadowBlur=0;

opacity+=0.05;
if(opacity>=1) clearInterval(anim);

},30);
}

// DOWNLOAD
function downloadPNG(){
let link=document.createElement("a");
link.download="certificate.png";
link.href=document.getElementById("canvas").toDataURL();
link.click();
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
let pdf=new jsPDF({orientation:"landscape"});
pdf.addImage(document.getElementById("canvas").toDataURL(),"PNG",10,10,280,160);
pdf.save("certificate.pdf");
}

// 📞 CONTACT FIXED
function openContact(){
document.getElementById("contactModal").style.display="block";
}
function closeContact(){
document.getElementById("contactModal").style.display="none";
}
window.onclick=function(e){
let modal=document.getElementById("contactModal");
if(e.target===modal){
modal.style.display="none";
}
}

// EMAIL
function sendEmail(){
let msg=document.getElementById("emailMsg").value;
window.location.href="mailto:jamilbakri.2015@gmail.com?subject=Contact&body="+msg;
}

</script>

</body>
</html>
