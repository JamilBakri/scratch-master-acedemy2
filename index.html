<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scratch Master Academy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(to right, #007BFF, #00c6ff);
  color:white;
}

header {
  padding:20px;
  text-align:center;
  font-size:30px;
  font-weight:bold;
  background:white;
  color:#007BFF;
}

.container { padding:20px; }

.card {
  background:white;
  color:black;
  padding:15px;
  border-radius:15px;
  margin:15px 0;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#007BFF;
  color:white;
  cursor:pointer;
}

input {
  padding:10px;
  margin:5px;
  width:90%;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-content {
  background:white;
  color:black;
  margin:10% auto;
  padding:20px;
  width:300px;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<header>🎮 Scratch Master Academy</header>

<div class="container">

<!-- CERTIFICATE -->
<div class="card">
<h2>📜 Certificate</h2>
<input id="certName" placeholder="Your name">
<button onclick="generateCert()">Generate</button>
<button onclick="downloadCert()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>

<br><br>
<canvas id="canvas" width="500" height="300" style="background:white;border-radius:10px;"></canvas>
</div>

<!-- CONTACT -->
<div class="card">
<h2>📞 Contact</h2>
<button onclick="openContact()">Open Contact</button>
</div>

<div id="contactModal" class="modal">
  <div class="modal-content">
    <h2>Contact Me</h2>
    <p>Jamil Bakri</p>
    <p>+35794020504</p>

    <a href="https://wa.me/35794020504" target="_blank">
      <button style="background:#25D366;">WhatsApp</button>
    </a>
  </div>
</div>

</div>

<script>

// ✅ NEW FIXED CERTIFICATE
function generateCert(){
  let name = document.getElementById("certName").value;
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  // CLEAR FIRST (IMPORTANT FIX)
  ctx.clearRect(0,0,500,300);

  // Background
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,500,300);

  // GOLD BORDER
  ctx.strokeStyle = "gold";
  ctx.lineWidth = 8;
  ctx.strokeRect(10,10,480,280);

  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;
  ctx.strokeRect(20,20,460,260);

  ctx.textAlign = "center";

  // TITLE
  ctx.font = "bold 26px Georgia";
  ctx.fillStyle = "#000";
  ctx.fillText("Certificate of Achievement", 250, 60);

  // TEXT
  ctx.font = "16px Arial";
  ctx.fillText("This is proudly awarded to", 250, 100);

  // NAME
  ctx.font = "bold 24px Georgia";
  ctx.fillStyle = "#007BFF";
  ctx.fillText(name, 250, 140);

  ctx.fillStyle = "#000";
  ctx.font = "16px Arial";
  ctx.fillText("For completing Scratch Master Course", 250, 170);

  // DATE
  let date = new Date().toLocaleDateString();
  ctx.fillText("Date: " + date, 100, 240);

  // SIGNATURE
  ctx.fillText("Signature:", 320, 240);
  ctx.beginPath();
  ctx.moveTo(400,245);
  ctx.lineTo(470,245);
  ctx.stroke();

  ctx.fillText("Jamil Bakri - Instructor", 250, 270);

  // 🖼️ LOGO (FIXED LOAD)
  let img = new Image();
  img.onload = function(){
    ctx.drawImage(img, 30, 30, 60, 60);
  };
  img.src = "https://upload.wikimedia.org/wikipedia/commons/7/75/Scratch.logo.S.png";

  // 🏅 SEAL
  ctx.beginPath();
  ctx.arc(430, 90, 30, 0, Math.PI*2);
  ctx.fillStyle = "gold";
  ctx.fill();

  ctx.fillStyle = "#000";
  ctx.font = "bold 12px Arial";
  ctx.fillText("OFFICIAL", 430, 95);
}

// DOWNLOAD PNG
function downloadCert(){
  let link = document.createElement("a");
  link.download = "certificate.png";
  link.href = document.getElementById("canvas").toDataURL();
  link.click();
}

// PDF
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  let canvas = document.getElementById("canvas");
  let img = canvas.toDataURL("image/png");

  let pdf = new jsPDF({orientation:"landscape"});
  pdf.addImage(img,'PNG',10,10,270,150);
  pdf.save("certificate.pdf");
}

// CONTACT
function openContact(){
  document.getElementById("contactModal").style.display = "block";
}

</script>

</body>
</html>
